options:
  # Ignore Prow provided substitutions.
  substitution_option: ALLOW_LOOSE
steps:
# Create builder.
- name: gcr.io/cloud-builders/docker
  args:
  - buildx
  - create
  - --bootstrap
  - --use
# Build image.
- name: gcr.io/cloud-builders/docker
  dir: images/nginx
  args:
  - buildx
  - build
  - --platform
  - linux/amd64,linux/arm,linux/arm64
  - rootfs
  - --tag
  - us-central1-docker.pkg.dev/${PROJECT_ID}/ingress-nginx/nginx
# Push image.
- name: gcr.io/cloud-builders/docker
  dir: images/nginx
  args:
  - buildx
  - build
  - --platform
  - linux/amd64,linux/arm,linux/arm64
  - rootfs
  - --tag
  - us-central1-docker.pkg.dev/${PROJECT_ID}/ingress-nginx/nginx
  - --push
